kind = "web"
previewPath = "/intelfon-app/"
title = "Intelfon - Gestión de Procesos"
version = "1.0.0"
id = "artifacts/intelfon-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/intelfon-app/" ]
localPort = 20861

[services.development]
run = "pnpm --filter @workspace/intelfon-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/intelfon-app", "run", "build" ]
publicDir = "artifacts/intelfon-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20861"
BASE_PATH = "/intelfon-app/"
